<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Telegram Clone — holodyxchat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: #0e1621; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        
        /* Экран входа */
        #login-screen { background: #17212b; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 350px; }
        #login-screen h2 { margin-bottom: 20px; color: #5288c1; }
        input[type="text"] { width: 100%; padding: 12px; background: #24303f; border: 1px solid #2f3e4e; border-radius: 8px; color: white; outline: none; margin-bottom: 15px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #5288c1; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #4374a5; }

        /* Главное окно мессенджера */
        #chat-screen { display: none; width: 800px; height: 85vh; background: #182533; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); overflow: hidden; }
        .sidebar { width: 250px; background: #17212b; border-right: 1px solid #101921; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px 15px 5px 15px; font-weight: bold; font-size: 16px; color: #5288c1; }
        .search-container { padding: 10px 15px; }
        .search-input { width: 100%; padding: 8px 12px; background: #24303f; border: none; border-radius: 6px; color: white; outline: none; font-size: 14px; }

        /* Список пользователей */
        .users-list-wrapper { flex: 1; overflow-y: auto; }
        .user-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #202b36; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .user-item:hover { background: #24303f; }
        .user-item.active { background: #2b5278; }
        .user-item.hidden { display: none !important; }

        /* Статусы Онлайн */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #7f8c8d; }
        .status-dot.online { background: #4cae4f; box-shadow: 0 0 6px #4cae4f; }
        .user-info { display: flex; flex-direction: column; }
        .user-status-text { font-size: 11px; color: #7f8c8d; }
        .user-status-text.online { color: #4cae4f; }

        /* Окно чата */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0e1621; }
        .chat-header { background: #17212b; padding: 15px; font-weight: bold; border-bottom: 1px solid #101921; }
        .chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: url('https://githubusercontent.com'); background-color: #0e1621;}
        .msg-block { padding: 8px 12px; border-radius: 12px; max-width: 70%; word-break: break-all; font-size: 15px; }
        .my-message { background: #2b5278; align-self: flex-end; border-bottom-right-radius: 2px; }
        .other-message { background: #182533; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #202b36; }
        .input-area { background: #17212b; padding: 12px; display: flex; gap: 10px; }
        .input-area input { margin-bottom: 0; flex: 1; }
    </style>
</head>
<body>

<!-- Экран авторизации -->
<div id="login-screen">
    <h2>Войти в Чат</h2>
    <input type="text" id="usernameInput" placeholder="Введите ваш ник..." onkeydown="if(event.key === 'Enter') handleAuth()">
    <button onclick="handleAuth()">Войти</button>
</div>

<!-- Главный экран -->
<div id="chat-screen">
    <div class="sidebar">
        <div class="sidebar-header">Чаты</div>
        <div class="search-container">
            <!-- СТРОКА ПОИСКА С ОБРАБОТКОЙ ENTER -->
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск людей..." oninput="filterUsers()" onkeydown="if(event.key === 'Enter') selectFirstFoundUser()">
        </div>
        <div class="users-list-wrapper" id="usersList"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header" id="chatHeader">Выберите чат из списка контактов</div>
        <div class="chat-window" id="chatWindow"></div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Напишите личное сообщение..." onkeydown="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" style="flex:none; width:50px;">➤</button>
        </div>
    </div>
</div>

<script>
    let ws;
    let myName = "";
    let activeRecipient = ""; 
    let history = {}; 
    let allUsersData = [];

    function getDeviceToken() {
        let token = localStorage.getItem("chat_device_token");
        if (!token) {
            token = crypto.randomUUID();
            localStorage.setItem("chat_device_token", token);
        }
        return token;
    }

    async function handleAuth() {
        let nameInput = document.getElementById("usernameInput").value.trim();
        if (!nameInput) { alert("Введите никнейм!"); return; }
        let token = getDeviceToken();

        try {
            let response = await fetch(`${window.location.protocol}//${window.location.host}/auth`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: nameInput, token: token })
            });
            let result = await response.json();
            if (result.success) {
                myName = nameInput;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("chat-screen").style.display = "flex";
                connectWebSocket();
            } else {
                alert(result.error);
            }
        } catch (error) { 
            alert("Не удалось связаться с сервером."); 
        }
    }

    function connectWebSocket() {
        let wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws/${myName}`);
        
        ws.onmessage = function(event) {
            let data = JSON.parse(event.data);
            if (data.type === "users") { allUsersData = data.users; updateUsersList(); }
            else if (data.type === "msg") { handleIncomingMessage(data.sender, data.text); }
        };
        ws.onclose = function(event) {
            if (event.code === 4000) { alert("Вас выбили из сети!"); location.reload(); }
        };
    }

    function updateUsersList() {
        let listDiv = document.getElementById("usersList");
        listDiv.innerHTML = "";
        allUsersData.forEach(user => {
            if (user.username !== myName) { 
                let userBtn = document.createElement("div");
                userBtn.classList.add("user-item");
                if (user.username === activeRecipient) userBtn.classList.add("active");
                let onlineClass = user.is_online ? "online" : "";
                let statusText = user.is_online ? "в сети" : "был(а) недавно";
                userBtn.innerHTML = `<div class="user-info"><strong>${user.username}</strong><span class="user-status-text ${onlineClass}">${statusText}</span></div><div class="status-dot ${onlineClass}"></div>`;
                userBtn.onclick = () => selectUser(user.username, userBtn);
                listDiv.appendChild(userBtn);
            }
        });
        filterUsers(); 
    }

    function filterUsers() {
        let query = document.getElementById("searchInput").value.toLowerCase().trim();
        document.querySelectorAll(".user-item").forEach(item => {
            let username = item.querySelector("strong").innerText.toLowerCase();
            item.classList.toggle("hidden", !username.includes(query));
        });
    }

    // НОВАЯ ФУНКЦИЯ: Выбор контакта по нажатию Enter в поиске
    function selectFirstFoundUser() {
        let firstVisibleUser = document.querySelector(".user-item:not(.hidden)");
        if (firstVisibleUser) {
            firstVisibleUser.click();
            document.getElementById("searchInput").value = "";
            filterUsers();
        }
    }

    function selectUser(username, element) {
        activeRecipient = username;
        document.getElementById("chatHeader").innerText = `Чат с: ${username}`;
        document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        renderChat();
    }

    function sendMessage() {
        let input = document.getElementById("messageInput");
        let text = input.value.trim();
        if (!activeRecipient) { alert("Выберите собеседника!"); return; }
        if (text !== "" && ws) {
            ws.send(JSON.stringify({ recipient: activeRecipient, text: text }));
            input.value = "";
        }
    }

    function handleIncomingMessage(sender, text) {
        let chatPartner = (sender === myName) ? activeRecipient : sender;
        if (!history[chatPartner]) history[chatPartner] = [];
        history[chatPartner].push({ sender: sender, text: text });
        if (chatPartner === activeRecipient) renderChat();
    }

    function renderChat() {
        let chatWindow = document.getElementById("chatWindow");
        chatWindow.innerHTML = "";
        (history[activeRecipient] || []).forEach(msg => {
            let msgBlock = document.createElement("div");
            msgBlock.classList.add("msg-block", msg.sender === myName ? "my-message" : "other-message");
            msgBlock.innerText = msg.text;
            chatWindow.appendChild(msgBlock);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>
</body>
</html>
